<!DOCTYPE html>
<html>
<head>
    <link href="styles/style.css" rel="stylesheet">
    <link href="styles/showcase-style.css" rel="stylesheet">
</head>
<body id="showcase-body">
    <div id="showcase-card">
        <div id="showcase-head">
            <img id="showcase-thumbnail" src="" alt="Game thumbnail" />
            <div id="showcase-head-meta">
                <div id="showcase-row-role" class="showcase-meta-row">
                    <img class="showcase-meta-icon" id="showcase-icon-role" src="imgs/icons/Role.png" alt="Role">
                    <span id="showcase-role"></span>
                </div>
                <div id="showcase-row-team" class="showcase-meta-row">
                    <img class="showcase-meta-icon" id="showcase-icon-team" src="imgs/icons/TeamSize.png" alt="Team size">
                    <span id="showcase-team-size"></span>
                </div>
                <div id="showcase-row-duration" class="showcase-meta-row">
                    <img class="showcase-meta-icon" id="showcase-icon-duration" src="imgs/icons/Duration.png" alt="Duration">
                    <span id="showcase-duration"></span>
                </div>
                <div id="showcase-row-tools" class="showcase-meta-row">
                    <img class="showcase-meta-icon" id="showcase-icon-tools" src="imgs/icons/Tools.png" alt="tools">
                    <span id="showcase-tools"></span>
                </div>
                <div id="showcase-row-platforms" class="showcase-meta-row">
                    <img class="showcase-meta-icon" id="showcase-icon-platforms" src="imgs/icons/Steam.png" alt="Platforms">
                    <span id="showcase-platforms"></span>
                    <div id="showcase-platform-icons" class="showcase-platform-icons"></div>
                </div>
                <div id="showcase-row-tags" class="showcase-meta-row">
                    <img class="showcase-meta-icon" id="showcase-icon-tags" src="imgs/icons/Role.png" alt="Tags">
                    <span id="showcase-tags"></span>
                </div>
            </div>
        </div>

        <div id="showcase-description">description</div>

        <div id="showcase-links"></div>
    </div>
</body>
