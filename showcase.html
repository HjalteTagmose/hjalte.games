<!DOCTYPE html>
<html>
<head>
    <link href="styles/style.css" rel="stylesheet">
    <link href="styles/showcase-style.css" rel="stylesheet">
</head>
<body id="showcase-body">
    <div id="showcase-card">
        <div id="showcase-head">
            <img id="showcase-thumbnail" src="" alt="Game thumbnail" />
            <div id="showcase-head-meta">
                <div id="showcase-title">TITLE</div>
                <div id="showcase-row-role" class="showcase-meta-row"><span class="meta-label">Role</span>: <span id="showcase-role"></span></div>
                <div id="showcase-row-team" class="showcase-meta-row"><span class="meta-label">Team</span>: <span id="showcase-team-size"></span></div>
                <div id="showcase-row-duration" class="showcase-meta-row"><span class="meta-label">Duration</span>: <span id="showcase-duration"></span></div>
                <div id="showcase-row-technology" class="showcase-meta-row"><span class="meta-label">Tech</span>: <span id="showcase-technology"></span></div>
                <div id="showcase-row-platforms" class="showcase-meta-row"><span class="meta-label">Platforms</span>: <span id="showcase-platforms"></span></div>
                <div id="showcase-row-tags" class="showcase-meta-row"><span class="meta-label">Tags</span>: <span id="showcase-tags"></span></div>
            </div>
        </div>

        <div id="showcase-description">description</div>

        <div id="showcase-links"></div>
    </div>
</body>
